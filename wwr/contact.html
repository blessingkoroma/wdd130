<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>White Water Rafting | Contact Us</title>

    <meta name="description"
      content="Contact White Water Rafting for bookings, questions, and feedback.">

    <meta name="author" content="Blessing Koroma">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img class="logo" src="images/rafting-logo.png" alt="White Water Rafting Logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <!-- CONTACT INFO -->
        <section class="contact-info">
            <h1>Contact Us</h1>
            <p><strong>Address:</strong> Bonny Island, Rivers State, Nigeria</p>
            <p><strong>Phone:</strong> +234 800 000 0000</p>
            <p><strong>Email:</strong> info@whitewaterrafting.com</p>
        </section>

        <!-- MAP + FORM -->
        <section class="contact-layout">

            <!-- MAP -->
            <div class="map-container">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d127288.06716513867!2d7.148832019622318!3d4.457139508882591!2m3!1f0!2f0!2f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x106850dae227e747%3A0xfdab92c24461a203!2sBonny%20Island!5e0!3m2!1sen!2sng!4v1780758611221!5m2!1sen!2sng"
                  width="100" height="100" loading="lazy">
                </iframe>
            </div>

            <!-- FORM -->
            <section class="contact-form">

                <h2>Send Us a Message</h2>

                <form action="#" method="post">

                    <!-- NAME -->
                    <div class="form-row">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <!-- EMAIL -->
                    <div class="form-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <!--form-row purpose-row -->
                    <div class="form-row purpose-row">
                        <label>Message Purpose</label>

                        <div class="radio-group">
                            <label>
                                <input type="radio" name="purpose" value="general" required>
                                General Inquiry
                            </label>

                            <label>
                                <input type="radio" name="purpose" value="reservation">
                                Reservation Question
                            </label>

                            <label>
                                <input type="radio" name="purpose" value="suggestion">
                                Website Suggestion
                            </label>
                        </div>
                    </div>
                    <!-- MESSAGE -->
                    <div class="form-row message-row">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>

                    <!-- SUBSCRIBE -->
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="subscribe" name="subscribe">
                            Please subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <!-- BUTTON -->
                    <div class="button-group">
                        <button type="submit">Get in Touch!</button>
                    </div>

                </form>

            </section>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>Our Team</h2>

            <div class="employee-gallery">

                <figure>
                    <img src="images/employee1.jpg" alt="Senior Guide">
                    <figcaption>Lucitta Halliday – Senior Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Operations Manager">
                    <figcaption>Favour Nbugere – Operations Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Safety Instructor">
                    <figcaption>Cephase Gift – Safety Instructor</figcaption>
                </figure>

            </div>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 💧 White Water Rafting | 💧 Blessing Koroma</p>

        <!-- SOCIAL MEDIA -->
        <nav class="socialmedia">

            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>

            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>

        </nav>

    </footer>

</body>

</html>
