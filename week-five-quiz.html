<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Quiz</title>
    <link rel="stylesheet" href="styles/week-five-quiz.css">
</head>

<body>

    <h1>HTML & CSS Quiz</h1>

    <form>

        <!-- Q1 -->
        <label for="q1">1. What does HTML stand for?</label>
        <input type="text" id="q1" name="q1">

        <!-- Q2 -->
        <label for="q2">2. Explain what CSS is used for:</label>
        <textarea id="q2" name="q2"></textarea>

        <!-- Q3 -->
        <label for="q3">3. Which language is used for styling web pages?</label>
        <select id="q3" name="q3">
            <option value="" selected disabled>Choose One...</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="js">JavaScript</option>
        </select>

        <!-- Q4 -->
        <label for="q4">4. How many values can a boolean have (0–1 scale)?</label>
        <input type="number" id="q4" name="q4">

        <!-- Submit -->
        <button type="submit">Submit Quiz</button>

    </form>

</body>

</html>
